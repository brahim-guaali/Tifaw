name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install "."
          pip install pyinstaller

      - name: Build Tifaw.app
        run: pyinstaller Tifaw.spec --noconfirm

      - name: Package as zip
        run: cd dist && zip -r Tifaw-macos.zip Tifaw.app

      - name: Package as dmg
        run: hdiutil create -volname "Tifaw" -srcfolder dist/Tifaw.app -ov -format UDZO dist/Tifaw.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Tifaw-macos.zip
            dist/Tifaw.dmg
          generate_release_notes: true
