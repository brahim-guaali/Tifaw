<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tifaw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        html, body {
            background: #ffffff;
            color: #1f2937;
            -webkit-font-smoothing: antialiased;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
            color-scheme: light;
            margin: 0;
            padding: 0;
            width: 340px;
        }
        @media (prefers-color-scheme: dark) {
            html, body { background: #ffffff; color: #1f2937; }
        }
        .pulse-dot { animation: pulse 1.4s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 0%, #f3f4f6 50%, #e5e7eb 100%);
            background-size: 200% 100%;
            animation: skeleton 1.4s ease-in-out infinite;
            border-radius: 4px;
            color: transparent;
            user-select: none;
        }
        @keyframes skeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .btn-row:active { transform: scale(0.98); }
        /* Fixed structural sizes so layout never jumps */
        .progress-card { height: 68px; }
        .stat-card { height: 60px; }
        .action-row { height: 40px; }
    </style>
</head>
<body class="text-gray-800">
<div x-data="menubar()" x-init="init()" class="p-3.5">

    <!-- Header — fixed height -->
    <div class="flex items-center gap-3 h-10 mb-3">
        <div class="w-10 h-10 flex-shrink-0 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-sm">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636"/></svg>
        </div>
        <div class="flex-1 min-w-0">
            <div class="text-[13px] font-semibold text-gray-900 leading-tight">Tifaw</div>
            <div class="text-[11px] text-gray-500 truncate leading-tight" x-text="statusLabel"></div>
        </div>
        <div class="w-2 h-2 flex-shrink-0 rounded-full"
             :class="ready ? (connected ? (isBusy ? 'bg-blue-500 pulse-dot' : 'bg-emerald-500') : 'bg-red-400') : 'bg-gray-300'"></div>
    </div>

    <!-- Progress — fixed height -->
    <div class="progress-card bg-gray-50 rounded-xl px-3.5 py-3 border border-gray-100 mb-3">
        <div class="flex items-baseline justify-between mb-2">
            <span class="text-[11px] font-medium text-gray-500 uppercase tracking-wide">Indexing</span>
            <span class="text-[11px] text-gray-400" x-text="ready ? pct + '%' : ''"></span>
        </div>
        <div class="h-2 bg-gray-200 rounded-full overflow-hidden relative">
            <div class="h-full rounded-full bg-gradient-to-r from-blue-500 to-indigo-500 transition-all duration-500"
                 :style="'width:' + (ready ? pct : 0) + '%'"></div>
            <div x-show="ready && isBusy" class="absolute inset-0 shimmer"></div>
        </div>
    </div>

    <!-- Stats grid — fixed height -->
    <div class="grid grid-cols-3 gap-2 mb-3">
        <div class="stat-card bg-white rounded-xl border border-gray-100 flex flex-col items-center justify-center">
            <div class="text-[10px] text-gray-400 uppercase tracking-wide font-medium">Found</div>
            <template x-if="ready">
                <div class="text-base font-bold text-gray-900 tabular-nums" x-text="fmt(status.total_files)"></div>
            </template>
            <template x-if="!ready">
                <div class="mt-1 w-12 h-4 skeleton">0</div>
            </template>
        </div>
        <div class="stat-card bg-white rounded-xl border border-gray-100 flex flex-col items-center justify-center">
            <div class="text-[10px] text-emerald-500 uppercase tracking-wide font-medium">Ready</div>
            <template x-if="ready">
                <div class="text-base font-bold text-emerald-600 tabular-nums" x-text="fmt(status.indexed_files)"></div>
            </template>
            <template x-if="!ready">
                <div class="mt-1 w-12 h-4 skeleton">0</div>
            </template>
        </div>
        <div class="stat-card bg-white rounded-xl border border-gray-100 flex flex-col items-center justify-center">
            <div class="text-[10px] text-gray-400 uppercase tracking-wide font-medium">Queue</div>
            <template x-if="ready">
                <div class="text-base font-bold text-gray-900 tabular-nums" x-text="fmt(remaining)"></div>
            </template>
            <template x-if="!ready">
                <div class="mt-1 w-12 h-4 skeleton">0</div>
            </template>
        </div>
    </div>

    <!-- Info row — fixed height -->
    <div class="flex items-center justify-between px-0.5 h-5 mb-2 text-[11px] text-gray-500">
        <div class="flex items-center gap-1.5 min-w-0">
            <svg class="w-3.5 h-3.5 flex-shrink-0 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M12 7v5l3 2"/></svg>
            <template x-if="ready">
                <span class="truncate" x-text="status.pending_renames > 0 ? status.pending_renames + ' pending renames' : 'No pending renames'"></span>
            </template>
            <template x-if="!ready">
                <span class="w-24 h-3 skeleton">·</span>
            </template>
        </div>
        <div class="flex items-center gap-1.5 flex-shrink-0">
            <span class="w-1.5 h-1.5 rounded-full" :class="ready ? (status.ollama_connected ? 'bg-emerald-500' : 'bg-red-400') : 'bg-gray-300'"></span>
            <span x-text="ready ? (status.ollama_connected ? 'AI online' : 'AI offline') : 'checking…'"></span>
        </div>
    </div>

    <!-- Divider -->
    <div class="h-px bg-gray-100 mx-0.5 mb-1"></div>

    <!-- Actions — fixed heights -->
    <div class="space-y-0.5">
        <button @click="openApp()" class="btn-row action-row w-full flex items-center gap-2.5 px-2.5 rounded-lg hover:bg-gray-100 transition-colors text-left">
            <svg class="w-4 h-4 flex-shrink-0 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
            <span class="text-[13px] font-medium text-gray-700">Open Tifaw</span>
        </button>
        <button @click="togglePause()" class="btn-row action-row w-full flex items-center gap-2.5 px-2.5 rounded-lg hover:bg-gray-100 transition-colors text-left">
            <template x-if="paused">
                <svg class="w-4 h-4 flex-shrink-0 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347c-.75.412-1.667-.13-1.667-.986V5.653z"/></svg>
            </template>
            <template x-if="!paused">
                <svg class="w-4 h-4 flex-shrink-0 text-amber-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5"/></svg>
            </template>
            <span class="text-[13px] font-medium text-gray-700" x-text="paused ? 'Resume indexing' : 'Pause indexing'"></span>
        </button>
        <div class="h-px bg-gray-100 my-1 mx-0.5"></div>
        <button @click="quitApp()" class="btn-row action-row w-full flex items-center gap-2.5 px-2.5 rounded-lg hover:bg-red-50 transition-colors text-left group">
            <svg class="w-4 h-4 flex-shrink-0 text-red-400 group-hover:text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9"/></svg>
            <span class="text-[13px] font-medium text-gray-700 group-hover:text-red-600">Quit Tifaw</span>
        </button>
    </div>
</div>

<script>
function menubar() {
    return {
        status: { total_files: 0, indexed_files: 0, pending_renames: 0, ollama_connected: false, queue_size: 0, pending_files: 0, tier1_files: 0 },
        ready: false,
        connected: false,
        paused: false,
        pollTimer: null,

        get remaining() {
            return (this.status.queue_size || 0) + (this.status.pending_files || 0);
        },
        get isBusy() {
            return this.remaining > 0 && !this.paused;
        },
        get pct() {
            const total = this.status.total_files || 0;
            if (total === 0) return 0;
            return Math.round(((this.status.indexed_files || 0) / total) * 100);
        },
        get statusLabel() {
            if (!this.ready) return 'Loading…';
            if (!this.connected) return 'Server unreachable';
            if (this.paused) return 'Indexing paused';
            if (this.remaining > 0) return 'Analyzing files…';
            return 'All caught up';
        },
        fmt(n) { return (n || 0).toLocaleString(); },

        async init() {
            await this.refresh();
            this.pollTimer = setInterval(() => this.refresh(), 2000);
        },

        async refresh() {
            try {
                const r = await fetch('/api/status');
                this.status = await r.json();
                this.connected = true;
                this.ready = true;
            } catch (e) {
                this.connected = false;
                this.ready = true;
            }
        },

        openApp() {
            try {
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.tifaw) {
                    window.webkit.messageHandlers.tifaw.postMessage({action: 'openWindow'});
                }
            } catch (e) {}
        },

        async togglePause() {
            this.paused = !this.paused;
            try {
                await fetch('/api/indexing/' + (this.paused ? 'pause' : 'resume'), { method: 'POST' });
            } catch (e) {}
        },

        quitApp() {
            try {
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.tifaw) {
                    window.webkit.messageHandlers.tifaw.postMessage({action: 'quit'});
                }
            } catch (e) {}
        },
    };
}
</script>
</body>
</html>
