watch_folders:
- ~/Downloads
- ~/Desktop
- ~/Documents
project_directories:
- ~/Projects
rename:
  enabled: true
  auto_approve: false
cleanup:
  threshold_days: 90
indexing:
  max_file_size_mb: 100
  supported_extensions:
  - .pdf
  - .png
  - .jpg
  - .jpeg
  - .gif
  - .webp
  - .txt
  - .md
  - .csv
  - .json
  - .py
  - .js
  - .ts
  - .jsx
  - .tsx
  - .html
  - .css
  - .go
  - .rs
  - .java
  - .cpp
  - .c
  - .h
  - .docx
  - .xlsx
  - .svg
