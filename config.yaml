watch_folders:
- ~/Downloads
- ~/Desktop
- ~/Documents
project_directories:
- ~/Projects
rename:
  enabled: true
  auto_approve: false
cleanup:
  threshold_days: 90
indexing:
  max_file_size_mb: 100
  recursive: true
  index_workers: 3
  supported_extensions:
  # Documents
  - .pdf
  - .docx
  - .doc
  - .xlsx
  - .xls
  - .pptx
  - .ppt
  - .txt
  - .md
  - .rtf
  - .csv
  - .pages
  - .numbers
  - .key
  # Images
  - .png
  - .jpg
  - .jpeg
  - .gif
  - .webp
  - .bmp
  - .svg
  - .tiff
  # Media
  - .mp4
  - .mov
  - .mp3
  - .m4a
